<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khutbah untuk Ummah - คลังคุฏบะฮ์รายสัปดาห์</title>
    <!-- Google Fonts: ใช้ฟอนต์ที่ดูสะอาดและหรูหรา -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome สำหรับไอคอนสวยๆ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1b4332; /* เขียวเข้มสไตล์อิสลาม */
            --accent-gold: #d4af37;   /* สีทองพรีเมียม */
            --light-bg: #f4f7f6;
            --text-dark: #2d3436;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--light-bg);
            color: var(--text-dark);
            margin: 0; padding: 0;
        }

        /* ส่วนหัว (Header) */
        header {
            background: linear-gradient(rgba(27, 67, 50, 0.95), rgba(27, 67, 50, 0.95)), 
                        url('https://www.transparenttextures.com/patterns/islamic-art.png');
            background-color: var(--primary-green);
            color: white;
            padding: 80px 20px;
            text-align: center;
            border-bottom: 6px solid var(--accent-gold);
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 3.5rem;
            margin: 0;
            color: var(--accent-gold);
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-top: 10px;
        }

        /* กล่องค้นหา */
        .container {
            max-width: 850px;
            margin: -35px auto 50px auto;
            padding: 0 20px;
        }

        .search-box {
            background: white;
            padding: 10px;
            border-radius: 50px;
            display: flex;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .search-box input {
            border: none;
            padding: 15px 25px;
            width: 100%;
            border-radius: 50px;
            outline: none;
            font-size: 1.1rem;
        }

        /* รายการคุฏบะฮ์ */
        .khutbah-item {
            background: white;
            margin-bottom: 15px;
            padding: 25px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: 0.3s;
            border-right: 5px solid transparent;
        }

        .khutbah-item:hover {
            transform: scale(1.02);
            border-right: 5px solid var(--accent-gold);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .khutbah-info h3 {
            margin: 0 0 8px 0;
            color: var(--primary-green);
            font-size: 1.3rem;
        }

        .khutbah-info span {
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        /* ปุ่มต่างๆ */
        .actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-view {
            background: #f1f2f6;
            color: var(--primary-green);
        }

        .btn-download {
            background: var(--primary-green);
            color: white;
        }

        .btn-download:hover {
            background: #2d6a4f;
            box-shadow: 0 5px 15px rgba(27, 67, 50, 0.3);
        }

        footer {
            text-align: center;
            padding: 50px;
            color: #95a5a6;
        }

        /* สำหรับมือถือ */
        @media (max-width: 600px) {
            .khutbah-item { flex-direction: column; text-align: center; }
            .actions { margin-top: 15px; width: 100%; justify-content: center; }
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Khutbah untuk Ummah</h1>
        <p>เผยแพร่คุฏบะฮ์และทางนำสู่สังคม</p>
    </header>

    <div class="container">
        <!-- ช่องค้นหา -->
        <div class="search-box">
            <input type="text" id="myInput" onkeyup="searchFunction()" placeholder="ค้นหาชื่อคุฏบะฮ์ หรือหัวข้อ...">
        </div>

        <div id="khutbahList">
            
           <div class="khutbah-item">
    <div class="khutbah-info">
        <h3 style="font-family: 'Amiri', serif; font-size: 1.6rem; direction: rtl;">خطبة هاري راي عيد الفطر 1447</h3>
        <p style="margin: 0; color: #2d6a4f; font-weight: bold;">คุฏบะฮ์วันอีดิลฟิฏริ ฮ.ศ. 1447</p>
        <span><i class="far fa-calendar-alt"></i> วันอีดิลฟิฏริ 1447</span>
    </div>
    <div class="actions">
        <!-- แก้ไขจาก files/ เป็น file/ ให้ตรงกับในรูปของคุณ -->
        <a href="file/khutbah-eid-1447.pdf" target="_blank" class="btn btn-view">
            <i class="far fa-eye"></i> ดูออนไลน์
        </a>
        <a href="file/khutbah-eid-1447.pdf" download="khutbah-eid.pdf" class="btn btn-download">
            <i class="fas fa-download"></i> ดาวน์โหลด
        </a>
    </div>
</div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Khutbah untuk Ummah | เพื่อการเผยแผ่ความรู้อิสลาม</p>
    </footer>

    <script>
        function searchFunction() {
            var input, filter, list, items, h3, i, txtValue;
            input = document.getElementById("myInput");
            filter = input.value.toUpperCase();
            list = document.getElementById("khutbahList");
            items = list.getElementsByClassName("khutbah-item");
            for (i = 0; i < items.length; i++) {
                h3 = items[i].getElementsByTagName("h3")[0];
                txtValue = h3.textContent || h3.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
