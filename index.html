<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khutbah untuk Ummah - Arsip Khutbah Mingguan</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1b4332;
            --accent-gold: #d4af37;
            --light-bg: #f8f9fa;
            --text-dark: #2d3436;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--light-bg);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        /* Hero Section & Header */
        header {
            background: linear-gradient(rgba(27, 67, 50, 0.9), rgba(27, 67, 50, 0.9)), 
                        url('https://www.transparenttextures.com/patterns/islamic-art.png');
            background-color: var(--primary-green);
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-bottom: 5px solid var(--accent-gold);
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        header p {
            font-weight: 300;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Search Bar */
        .container {
            max-width: 900px;
            margin: -30px auto 50px auto;
            padding: 0 20px;
        }

        .search-container {
            background: white;
            padding: 10px;
            border-radius: 50px;
            display: flex;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .search-container input {
            border: none;
            padding: 15px 25px;
            width: 100%;
            border-radius: 50px;
            outline: none;
            font-size: 1rem;
        }

        /* Khutbah Card List */
        .khutbah-list {
            margin-top: 40px;
        }

        .khutbah-card {
            background: white;
            margin-bottom: 20px;
            padding: 25px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, border-left 0.3s ease;
            border-left: 0px solid var(--accent-gold);
        }

        .khutbah-card:hover {
            transform: translateY(-5px);
            border-left: 8px solid var(--accent-gold);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .khutbah-info h3 {
            margin: 0 0 5px 0;
            color: var(--primary-green);
            font-size: 1.25rem;
        }

        .khutbah-info span {
            font-size: 0.85rem;
            color: #888;
        }

        .khutbah-actions {
            display: flex;
            gap: 10px;
        }

        /* Buttons Style */
        .btn {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-view {
            background-color: #f1f2f6;
            color: var(--primary-green);
        }

        .btn-view:hover {
            background-color: #dfe4ea;
        }

        .btn-download {
            background-color: var(--primary-green);
            color: white;
        }

        .btn-download:hover {
            background-color: #2d6a4f;
            box-shadow: 0 4px 12px rgba(27, 67, 50, 0.3);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .khutbah-card {
                flex-direction: column;
                text-align: center;
            }
            .khutbah-actions {
                margin-top: 20px;
                width: 100%;
                justify-content: center;
            }
            header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Khutbah untuk Ummah</h1>
        <p>Menebar Kebaikan melalui Untaian Nasihat Mingguan</p>
    </header>

    <div class="container">
        <!-- Search Box -->
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari judul khutbah atau tema...">
        </div>

        <div class="khutbah-list" id="khutbahList">
            
            <!-- Item Khutbah 1 (Contoh) -->
            <div class="khutbah-card">
                <div class="khutbah-info">
                    <h3>Menjaga Lisan di Era Digital</h3>
                    <span><i class="far fa-calendar-alt"></i> 22 Maret 2024</span>
                </div>
                <div class="khutbah-actions">
                    <a href="files/khutbah-1.pdf" target="_blank" class="btn btn-view">
                        <i class="far fa-eye"></i> Lihat
                    </a>
                    <a href="files/khutbah-1.pdf" download class="btn btn-download">
                        <i class="fas fa-cloud-download-alt"></i> Download
                    </a>
                </div>
            </div>

            <!-- Item Khutbah 2 (Contoh) -->
            <div class="khutbah-card">
                <div class="khutbah-info">
                    <h3>Keutamaan Bulan Suci Ramadhan</h3>
                    <span><i class="far fa-calendar-alt"></i> 15 Maret 2024</span>
                </div>
                <div class="khutbah-actions">
                    <a href="files/khutbah-2.pdf" target="_blank" class="btn btn-view">
                        <i class="far fa-eye"></i> Lihat
                    </a>
                    <a href="files/khutbah-2.pdf" download class="btn btn-download">
                        <i class="fas fa-cloud-download-alt"></i> Download
                    </a>
                </div>
            </div>

            <!-- Tambahkan card baru di sini setiap minggu -->

        </div>
    </div>

    <footer>
        <p>&copy; 2024 Khutbah untuk Ummah. Dikembangkan untuk kemaslahatan Ummat.</p>
    </footer>

    <script>
        // Fungsi sederhana untuk mencari khutbah
        document.getElementById('searchInput').addEventListener('keyup', function() {
            let filter = this.value.toLowerCase();
            let cards = document.querySelectorAll('.khutbah-card');
            
            cards.forEach(card => {
                let title = card.querySelector('h3').innerText.toLowerCase();
                if(title.includes(filter)) {
                    card.style.display = "";
                } else {
                    card.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
